      <circle cx="1140" cy="244" r="292" fill="none" stroke="#8244e0" stroke-width="5" opacity="0.7"/>
      <circle cx="292" cy="1510" r="166" fill="url(#orbGrad)"/>
      <circle cx="292" cy="1510" r="206" fill="none" stroke="#8244e0" stroke-width="8"/>
      <circle cx="292" cy="1510" r="292" fill="none" stroke="#8244e0" stroke-width="5" opacity="0.7"/>
      <circle cx="1194" cy="1472" r="166" fill="url(#orbGrad)"/>
      <circle cx="1194" cy="1472" r="206" fill="none" stroke="#8244e0" stroke-width="8"/>
      <circle cx="1194" cy="1472" r="292" fill="none" stroke="#8244e0" stroke-width="5" opacity="0.7"/>
      <polygon points="224,474 242,436 262,474 300,492 262,510 242,548 224,510 186,492" fill="#f3c94b"/>
    </g>

    <text x="704" y="520" text-anchor="middle" class="name-shadow">King</text>
    <text x="704" y="520" text-anchor="middle" class="name-text">King</text>
    <line x1="400" y1="596" x2="1008" y2="596" stroke="#9d6dff" stroke-width="8" opacity="0.85"/>

    <text x="704" y="760" text-anchor="middle" class="contact-white">www.edudashpro.org.za</text>
    <text x="704" y="860" text-anchor="middle" class="contact-yellow">info@edudashpro.org.za</text>
    <text x="704" y="960" text-anchor="middle" class="contact-white">0674770975</text>

    <text x="704" y="1806" text-anchor="middle" class="panel-note">Large name top-center, contact block centered below.</text>
  </g>

  <g id="front-panel" transform="translate(2500 420)">
    <text x="270" y="-70" class="guide-label">Front Panel</text>
    <path class="panel-cut" d="M140,80 L400,20 L1180,20 L1440,80 L1342,1970 L238,1970 Z"/>
    <path class="panel-safe" d="M214,108 L438,68 L1142,68 L1366,108 L1288,1900 L292,1900 Z"/>
    <path d="M502,20 C548,124 784,124 828,20" fill="none" stroke="#b996ff" stroke-width="8"/>

