      <circle cx="272" cy="244" r="206" fill="none" stroke="#8244e0" stroke-width="8"/>
      <circle cx="272" cy="244" r="292" fill="none" stroke="#8244e0" stroke-width="5" opacity="0.7"/>
      <circle cx="1140" cy="244" r="166" fill="url(#orbGrad)"/>
