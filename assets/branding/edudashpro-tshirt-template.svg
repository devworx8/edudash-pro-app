      <rect x="1042" y="268" width="160" height="12" rx="6" transform="rotate(-36 1122 274)" fill="#b985ff" opacity="0.88"/>
      <circle cx="708" cy="478" r="404" fill="#050916" opacity="0.34" filter="url(#softGlow)"/>
      <circle cx="586" cy="356" r="216" fill="#1594c4" opacity="0.16" filter="url(#softGlow)"/>
      <circle cx="864" cy="648" r="194" fill="#c58a18" opacity="0.14" filter="url(#softGlow)"/>
      <circle cx="708" cy="478" r="286" fill="url(#shieldOuterDisc)"/>
      <circle cx="708" cy="478" r="286" fill="none" stroke="url(#shieldRimStroke)" stroke-width="20"/>
      <circle cx="708" cy="478" r="220" fill="url(#shieldMidDisc)"/>
      <circle cx="708" cy="478" r="220" fill="none" stroke="url(#shieldMidStroke)" stroke-width="16"/>
      <circle cx="708" cy="478" r="162" fill="url(#shieldInnerDisc)"/>
      <circle cx="708" cy="478" r="162" fill="none" stroke="url(#shieldInnerStroke)" stroke-width="14"/>
      <circle cx="708" cy="478" r="104" fill="url(#shieldCoreDisc)"/>
      <circle cx="708" cy="478" r="40" fill="#cbc0ff" opacity="0.86"/>
      <circle cx="708" cy="478" r="12" fill="#f4efff"/>
      <ellipse cx="636" cy="402" rx="78" ry="44" fill="#ffffff" opacity="0.16" transform="rotate(-18 636 402)"/>
      <path d="M480 322 A 282 282 0 0 1 894 260" fill="none" stroke="#ffffff" stroke-width="12" opacity="0.18" stroke-linecap="round"/>
      <path d="M888 708 A 232 232 0 0 1 592 744" fill="none" stroke="#0b0717" stroke-width="16" opacity="0.34" stroke-linecap="round"/>
      <circle cx="708" cy="478" r="248" fill="none" stroke="#8f63ff" stroke-width="4" opacity="0.84"/>
      <circle cx="708" cy="478" r="192" fill="none" stroke="#8ecf76" stroke-width="4" opacity="0.58"/>
      <circle cx="382" cy="238" r="8" fill="#f3c94b"/>
      <circle cx="470" cy="150" r="5" fill="#b993ff"/>
      <circle cx="548" cy="540" r="4" fill="#f0e7ff"/>
      <circle cx="910" cy="246" r="5" fill="#5ad0ff"/>
      <circle cx="1046" cy="318" r="5" fill="#f3c94b"/>
      <circle cx="1086" cy="694" r="6" fill="#f3c94b"/>
      <circle cx="932" cy="712" r="4" fill="#f0e7ff"/>
      <circle cx="462" cy="760" r="4" fill="#a987ff"/>
      <circle cx="354" cy="678" r="4" fill="#f3c94b"/>
      <circle cx="1162" cy="436" r="4" fill="#a987ff"/>
    </g>

    <text x="704" y="1552" text-anchor="middle" class="front-brand">EduDash Pro</text>
    <text x="704" y="1638" text-anchor="middle" class="front-tagline">Empowering Education</text>
    <text x="704" y="1806" text-anchor="middle" class="panel-note">Main orb centered on upper chest. Brand lockup centered low.</text>
  </g>

  <g id="back-hem-band" transform="translate(1366 2518)">
    <text x="0" y="-30" class="guide-small">Back hem strip / optional trim</text>
    <rect x="0" y="0" width="868" height="122" fill="#180735" stroke="#b996ff" stroke-width="6"/>
    <rect x="0" y="46" width="868" height="28" fill="#8d47ff"/>
  </g>

  <g id="front-hem-band" transform="translate(2786 2518)">
    <text x="0" y="-30" class="guide-small">Front hem strip / optional trim</text>
    <rect x="0" y="0" width="868" height="122" fill="#180735" stroke="#b996ff" stroke-width="6"/>
    <rect x="0" y="46" width="868" height="28" fill="#8d47ff"/>
  </g>

  <g id="production-notes" transform="translate(140 2780)">
    <text x="0" y="0" class="guide-label">Designer Notes</text>
    <text x="0" y="44" class="guide-copy">1. Open this SVG in CorelDRAW and keep each group on its own layer: front panel, back panel, sleeves, hem strips, notes.</text>
    <text x="0" y="86" class="guide-copy">2. If your printer has exact cut patterns, replace these cut lines first and then scale the art to those patterns.</text>
    <text x="0" y="128" class="guide-copy">3. Convert final text to curves before export. Keep website, email, and phone centered and inside the dashed safe zone.</text>
    <text x="0" y="170" class="guide-copy">4. Suggested back name treatment: white fill, gold outline, purple shadow. Suggested front title: rounded soft white wordmark.</text>
  </g>
</svg>
