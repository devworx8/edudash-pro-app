<svg xmlns="http://www.w3.org/2000/svg" width="480mm" height="320mm" viewBox="0 0 4800 3200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#180735"/>
      <stop offset="55%" stop-color="#1c0a46"/>
      <stop offset="100%" stop-color="#0e0524"/>
    </linearGradient>
    <radialGradient id="orbGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d56eff"/>
      <stop offset="22%" stop-color="#7b36d9"/>
      <stop offset="55%" stop-color="#26104e"/>
      <stop offset="100%" stop-color="#0f0527"/>
    </radialGradient>
    <radialGradient id="dashOrbCore" cx="42%" cy="38%" r="62%">
      <stop offset="0%" stop-color="#a97cff"/>
      <stop offset="68%" stop-color="#645fff"/>
      <stop offset="100%" stop-color="#5245de"/>
    </radialGradient>
    <radialGradient id="shieldOuterDisc" cx="34%" cy="28%" r="78%">
      <stop offset="0%" stop-color="#33407d"/>
      <stop offset="42%" stop-color="#1a1f49"/>
      <stop offset="100%" stop-color="#060a1b"/>
    </radialGradient>
    <radialGradient id="shieldMidDisc" cx="34%" cy="28%" r="78%">
      <stop offset="0%" stop-color="#7c59ff"/>
      <stop offset="44%" stop-color="#4f31b8"/>
      <stop offset="100%" stop-color="#241145"/>
    </radialGradient>
    <radialGradient id="shieldInnerDisc" cx="34%" cy="28%" r="78%">
      <stop offset="0%" stop-color="#9f7eff"/>
      <stop offset="52%" stop-color="#6555f2"/>
      <stop offset="100%" stop-color="#332274"/>
    </radialGradient>
    <radialGradient id="shieldCoreDisc" cx="34%" cy="28%" r="78%">
      <stop offset="0%" stop-color="#d6cbff"/>
      <stop offset="34%" stop-color="#b8a8ff"/>
      <stop offset="100%" stop-color="#8b74ff"/>
    </radialGradient>
    <linearGradient id="shieldRimStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8beff"/>
      <stop offset="38%" stop-color="#8d6fff"/>
      <stop offset="100%" stop-color="#1a1139"/>
    </linearGradient>
    <linearGradient id="shieldMidStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ede6ff"/>
      <stop offset="46%" stop-color="#8fce76"/>
      <stop offset="100%" stop-color="#2c1758"/>
    </linearGradient>
    <linearGradient id="shieldInnerStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#efe8ff"/>
      <stop offset="44%" stop-color="#9f86ff"/>
      <stop offset="100%" stop-color="#33235c"/>
    </linearGradient>
    <linearGradient id="flareGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f8df80" stop-opacity="0"/>
      <stop offset="45%" stop-color="#f8df80" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#9b5cff" stop-opacity="0"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .panel-cut { fill: url(#bgGrad); stroke: #b996ff; stroke-width: 8; }
      .panel-safe { fill: none; stroke: #e7d7ff; stroke-width: 4; stroke-dasharray: 18 16; opacity: 0.9; }
      .guide-label { fill: #201046; font-family: Arial, Helvetica, sans-serif; font-size: 44px; font-weight: 700; }
      .guide-copy { fill: #413260; font-family: Arial, Helvetica, sans-serif; font-size: 28px; }
      .guide-small { fill: #5b4d76; font-family: Arial, Helvetica, sans-serif; font-size: 24px; }
      .panel-title { fill: #ffffff; font-family: Arial, Helvetica, sans-serif; font-size: 46px; font-weight: 700; letter-spacing: 4px; }
      .panel-note { fill: #efe7ff; font-family: Arial, Helvetica, sans-serif; font-size: 24px; }
      .name-text { fill: #ffffff; stroke: #f2c54e; stroke-width: 18; paint-order: stroke fill; font-family: Impact, Arial Black, sans-serif; font-size: 210px; font-weight: 900; letter-spacing: 1px; }
      .name-shadow { fill: none; stroke: #7e43d6; stroke-width: 42; opacity: 0.95; }
      .contact-white { fill: #ffffff; font-family: Arial, Helvetica, sans-serif; font-size: 64px; font-weight: 700; }
      .contact-yellow { fill: #f3c94b; font-family: Arial, Helvetica, sans-serif; font-size: 64px; font-weight: 700; }
      .front-brand { fill: #fbf7ff; font-family: "Trebuchet MS", Arial, Helvetica, sans-serif; font-size: 96px; }
      .front-tagline { fill: #b8a7d8; font-family: "Trebuchet MS", Arial, Helvetica, sans-serif; font-size: 42px; letter-spacing: 5px; }
      .palette-label { fill: #2a184c; font-family: Arial, Helvetica, sans-serif; font-size: 26px; font-weight: 700; }
    </style>
  </defs>

  <rect width="4800" height="3200" fill="#f4f1fb"/>
  <rect x="70" y="70" width="4660" height="3060" rx="28" fill="#ffffff" stroke="#d6c8f1" stroke-width="6"/>

  <text x="140" y="185" class="guide-label">EduDash Pro T-Shirt Layout Template</text>
  <text x="140" y="232" class="guide-copy">SVG handoff for CorelDRAW. Replace these panel cut lines with the printer's exact garment pattern before final production.</text>
  <text x="140" y="272" class="guide-small">Dashed line = safe text zone. Keep live text, email, phone number, and logo inside the safe zone. Add bleed outside the cut line if your printer requires it.</text>

  <g id="palette" transform="translate(3890 2280)">
    <text x="0" y="0" class="guide-label">Palette</text>
    <g transform="translate(0 30)">
      <rect x="0" y="0" width="90" height="90" rx="12" fill="#180735"/>
      <text x="112" y="56" class="palette-label">Base Indigo - #180735</text>
      <rect x="0" y="110" width="90" height="90" rx="12" fill="#7b36d9"/>
      <text x="112" y="166" class="palette-label">Primary Purple - #7B36D9</text>
      <rect x="0" y="220" width="90" height="90" rx="12" fill="#d56eff"/>
      <text x="112" y="276" class="palette-label">Glow Violet - #D56EFF</text>
      <rect x="0" y="330" width="90" height="90" rx="12" fill="#f3c94b"/>
      <text x="112" y="386" class="palette-label">Gold Accent - #F3C94B</text>
      <rect x="0" y="440" width="90" height="90" rx="12" fill="#fbf7ff" stroke="#bda8e8" stroke-width="3"/>
      <text x="112" y="496" class="palette-label">Warm White - #FBF7FF</text>
      <rect x="0" y="550" width="90" height="90" rx="12" fill="#b8a7d8"/>
      <text x="112" y="606" class="palette-label">Soft Lavender - #B8A7D8</text>
    </g>
  </g>

  <g id="sleeves-left" transform="translate(180 520)">
    <text x="40" y="-55" class="guide-label">Left Sleeve</text>
    <path class="panel-cut" d="M80,140 C100,36 230,12 420,20 L620,82 L564,360 L210,390 C116,394 58,320 58,250 C58,220 66,184 80,140 Z"/>
    <path class="panel-safe" d="M118,146 C136,66 246,52 396,58 L570,110 L528,332 L224,354 C154,358 106,302 106,246 C106,220 110,188 118,146 Z"/>
    <g transform="translate(258 112)">
      <circle cx="120" cy="118" r="112" fill="url(#orbGrad)" opacity="0.95"/>
      <circle cx="120" cy="118" r="92" fill="none" stroke="#7b36d9" stroke-width="8" opacity="0.78"/>
      <circle cx="120" cy="118" r="66" fill="none" stroke="#b56dff" stroke-width="6" opacity="0.6"/>
      <circle cx="120" cy="118" r="26" fill="#d56eff" filter="url(#softGlow)"/>
      <circle cx="34" cy="232" r="24" fill="#8d47ff"/>
      <circle cx="454" cy="206" r="20" fill="#f3c94b"/>
      <circle cx="476" cy="118" r="14" fill="#7b36d9"/>
      <circle cx="86" cy="278" r="12" fill="#f3c94b"/>
    </g>
    <text x="88" y="438" class="panel-note">Keep motif centered around sleeve crown.</text>
  </g>

  <g id="sleeves-right" transform="translate(180 1220)">
    <text x="40" y="-55" class="guide-label">Right Sleeve</text>
    <path class="panel-cut" d="M80,140 C100,36 230,12 420,20 L620,82 L564,360 L210,390 C116,394 58,320 58,250 C58,220 66,184 80,140 Z"/>
    <path class="panel-safe" d="M118,146 C136,66 246,52 396,58 L570,110 L528,332 L224,354 C154,358 106,302 106,246 C106,220 110,188 118,146 Z"/>
    <g transform="translate(256 112)">
      <circle cx="120" cy="118" r="112" fill="url(#orbGrad)" opacity="0.95"/>
      <circle cx="120" cy="118" r="92" fill="none" stroke="#7b36d9" stroke-width="8" opacity="0.78"/>
      <circle cx="120" cy="118" r="66" fill="none" stroke="#b56dff" stroke-width="6" opacity="0.6"/>
      <circle cx="120" cy="118" r="26" fill="#d56eff" filter="url(#softGlow)"/>
      <circle cx="490" cy="196" r="18" fill="#8d47ff"/>
      <circle cx="442" cy="126" r="22" fill="#f3c94b"/>
      <circle cx="92" cy="260" r="14" fill="#7b36d9"/>
      <circle cx="58" cy="212" r="12" fill="#f3c94b"/>
    </g>
    <text x="88" y="438" class="panel-note">Mirror or vary dot placement if preferred.</text>
  </g>

  <g id="back-panel" transform="translate(1080 420)">
