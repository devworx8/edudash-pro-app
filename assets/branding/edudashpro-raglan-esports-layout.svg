    <text x="760" y="1016" text-anchor="middle" class="brand-main">EDUDASH PRO</text>
    <line x1="468" y1="1052" x2="1052" y2="1052" stroke="url(#goldLine)" stroke-width="8"/>
    <text x="760" y="1124" text-anchor="middle" class="brand-sub">EMPOWERING EDUCATION</text>

    <rect x="434" y="1642" width="652" height="172" rx="26" fill="url(#meshPattern)" opacity="0.38"/>
    <text x="760" y="1906" text-anchor="middle" class="panel-note">Sport-cut front with raglan shoulders, curved side panels, central EduDash orb, and bold brand lockup.</text>
