<svg xmlns="http://www.w3.org/2000/svg" width="480mm" height="320mm" viewBox="0 0 4800 3200">
  <defs>
    <linearGradient id="pageBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f6f3fb"/>
      <stop offset="100%" stop-color="#ece6f8"/>
    </linearGradient>
    <linearGradient id="shirtBase" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#17062f"/>
      <stop offset="50%" stop-color="#140728"/>
      <stop offset="100%" stop-color="#0d041f"/>
    </linearGradient>
    <linearGradient id="accentPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#41b7ff"/>
      <stop offset="12%" stop-color="#63a1ff"/>
      <stop offset="36%" stop-color="#8d5dff"/>
      <stop offset="66%" stop-color="#7b36d9"/>
      <stop offset="100%" stop-color="#4b1f94"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f7e39e"/>
      <stop offset="48%" stop-color="#f3c94b"/>
      <stop offset="100%" stop-color="#c78d18"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="45%" r="56%">
      <stop offset="0%" stop-color="#df7bff"/>
      <stop offset="22%" stop-color="#9747ff"/>
      <stop offset="52%" stop-color="#37116a"/>
      <stop offset="100%" stop-color="#140628"/>
    </radialGradient>
    <radialGradient id="dashOrbCore" cx="42%" cy="38%" r="62%">
      <stop offset="0%" stop-color="#a97cff"/>
      <stop offset="68%" stop-color="#645fff"/>
      <stop offset="100%" stop-color="#5245de"/>
    </radialGradient>
    <radialGradient id="shieldOuterDisc" cx="34%" cy="28%" r="78%">
      <stop offset="0%" stop-color="#33407d"/>
      <stop offset="42%" stop-color="#1a1f49"/>
      <stop offset="100%" stop-color="#060a1b"/>
    </radialGradient>
    <radialGradient id="shieldMidDisc" cx="34%" cy="28%" r="78%">
      <stop offset="0%" stop-color="#7c59ff"/>
      <stop offset="44%" stop-color="#4f31b8"/>
      <stop offset="100%" stop-color="#241145"/>
    </radialGradient>
    <radialGradient id="shieldInnerDisc" cx="34%" cy="28%" r="78%">
      <stop offset="0%" stop-color="#9f7eff"/>
      <stop offset="52%" stop-color="#6555f2"/>
      <stop offset="100%" stop-color="#332274"/>
    </radialGradient>
    <radialGradient id="shieldCoreDisc" cx="34%" cy="28%" r="78%">
      <stop offset="0%" stop-color="#d6cbff"/>
      <stop offset="34%" stop-color="#b8a8ff"/>
      <stop offset="100%" stop-color="#8b74ff"/>
    </radialGradient>
    <linearGradient id="shieldRimStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8beff"/>
      <stop offset="38%" stop-color="#8d6fff"/>
      <stop offset="100%" stop-color="#1a1139"/>
    </linearGradient>
    <linearGradient id="shieldMidStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ede6ff"/>
      <stop offset="46%" stop-color="#8fce76"/>
      <stop offset="100%" stop-color="#2c1758"/>
    </linearGradient>
    <linearGradient id="shieldInnerStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#efe8ff"/>
      <stop offset="44%" stop-color="#9f86ff"/>
      <stop offset="100%" stop-color="#33235c"/>
    </linearGradient>
    <pattern id="meshPattern" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="13" cy="13" r="2.7" fill="#2d1e4a" opacity="0.6"/>
    </pattern>
    <filter id="outerGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="16" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .guide-title { fill: #21113f; font-family: Arial, Helvetica, sans-serif; font-size: 46px; font-weight: 700; }
      .guide-copy { fill: #52436f; font-family: Arial, Helvetica, sans-serif; font-size: 28px; }
      .guide-small { fill: #6a5a87; font-family: Arial, Helvetica, sans-serif; font-size: 24px; }
      .cut-line { fill: url(#shirtBase); stroke: #b896ff; stroke-width: 8; }
      .safe-line { fill: none; stroke: #efe4ff; stroke-width: 4; stroke-dasharray: 18 16; opacity: 0.92; }
      .panel-label { fill: #2a184c; font-family: Arial, Helvetica, sans-serif; font-size: 42px; font-weight: 700; }
      .panel-note { fill: #efe8ff; font-family: Arial, Helvetica, sans-serif; font-size: 24px; }
      .brand-main { fill: #fbf8ff; font-family: Impact, Arial Black, sans-serif; font-size: 118px; font-weight: 900; letter-spacing: 6px; }
      .brand-sub { fill: #c2b1e3; font-family: Arial, Helvetica, sans-serif; font-size: 42px; letter-spacing: 9px; font-weight: 700; }
      .back-name { fill: #ffffff; stroke: #f3c94b; stroke-width: 16; paint-order: stroke fill; font-family: Impact, Arial Black, sans-serif; font-size: 180px; font-weight: 900; letter-spacing: 2px; }
      .back-name-shadow { fill: none; stroke: #7d42db; stroke-width: 38; opacity: 0.95; }
      .contact-line { fill: #fbf8ff; font-family: Arial, Helvetica, sans-serif; font-size: 58px; font-weight: 700; }
      .contact-accent { fill: #f3c94b; font-family: Arial, Helvetica, sans-serif; font-size: 58px; font-weight: 700; }
      .mini-label { fill: #2a184c; font-family: Arial, Helvetica, sans-serif; font-size: 26px; font-weight: 700; }
    </style>
  </defs>

  <rect width="4800" height="3200" fill="url(#pageBg)"/>
  <rect x="70" y="70" width="4660" height="3060" rx="28" fill="#ffffff" stroke="#d7ccf0" stroke-width="6"/>

  <text x="140" y="185" class="guide-title">EduDash Pro Sport / Esports Layout</text>
  <text x="140" y="232" class="guide-copy">Alternative jersey-style design using the raglan collar and shoulder layout from your reference, adapted to the EduDash Pro purple visual system.</text>
  <text x="140" y="272" class="guide-small">Open in CorelDRAW, move each group to its own layer, and replace the cut shape with the printer's exact pattern before final output.</text>

  <g id="palette" transform="translate(3920 2250)">
    <text x="0" y="0" class="guide-title">Palette</text>
    <g transform="translate(0 32)">
      <rect x="0" y="0" width="88" height="88" rx="12" fill="#17062f"/>
      <text x="112" y="55" class="mini-label">Night Purple - #17062F</text>
      <rect x="0" y="108" width="88" height="88" rx="12" fill="#7b36d9"/>
      <text x="112" y="163" class="mini-label">Brand Purple - #7B36D9</text>
      <rect x="0" y="216" width="88" height="88" rx="12" fill="#41b7ff"/>
      <text x="112" y="271" class="mini-label">Electric Blue - #41B7FF</text>
      <rect x="0" y="324" width="88" height="88" rx="12" fill="#f3c94b"/>
      <text x="112" y="379" class="mini-label">Gold Accent - #F3C94B</text>
      <rect x="0" y="432" width="88" height="88" rx="12" fill="#fbf8ff" stroke="#c9bae8" stroke-width="3"/>
      <text x="112" y="487" class="mini-label">Warm White - #FBF8FF</text>
    </g>
  </g>

