    <rect x="402" y="1226" width="716" height="278" rx="28" fill="url(#meshPattern)" opacity="0.36"/>
    <text x="760" y="1768" text-anchor="middle" class="panel-note">Use this back for staff, event, or esports-style promo shirts. Replace &quot;KING&quot; with role, surname, or branch name.</text>
  </g>

  <g id="designer-notes" transform="translate(140 2790)">
    <text x="0" y="0" class="guide-title">Designer Notes</text>
    <text x="0" y="42" class="guide-copy">1. This layout is intentionally more athletic than the first template: collar ring, raglan shoulder arcs, side contour panels, and stronger center focus.</text>
    <text x="0" y="84" class="guide-copy">2. Open the SVG in CorelDRAW and convert live text to curves before final export.</text>
    <text x="0" y="126" class="guide-copy">3. If you need exact sublimation panels, ask the supplier for the graded front/back sleeve pattern and replace the template cut lines.</text>
    <text x="0" y="168" class="guide-copy">4. This version works well for expo staff shirts, esports activations, school showcase events, and branded promo wear.</text>
  </g>
</svg>
