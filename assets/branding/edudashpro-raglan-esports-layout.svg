    <text x="760" y="592" text-anchor="middle" class="back-name-shadow">KING</text>
    <text x="760" y="592" text-anchor="middle" class="back-name">KING</text>
    <line x1="434" y1="652" x2="1086" y2="652" stroke="url(#goldLine)" stroke-width="8"/>

    <text x="760" y="824" text-anchor="middle" class="contact-line">www.edudashpro.org.za</text>
    <text x="760" y="920" text-anchor="middle" class="contact-accent">info@edudashpro.org.za</text>
