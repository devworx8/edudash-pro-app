<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <!-- Allow eval for Metro bundler + blob: workers for expo-audio on web -->
  <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; script-src * 'unsafe-inline' 'unsafe-eval' blob:; worker-src * blob:; connect-src * blob: data: 'unsafe-inline'; img-src * data: blob: 'unsafe-inline'; media-src * blob: data:; frame-src *; style-src * 'unsafe-inline';">
  <title>EduDash Pro</title>
  <meta name="description" content="Revolutionary AI-powered educational platform for preschools" />

  <!-- PWA: manifest + theme -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0a0a0f" />

  <!-- iOS Add to Home Screen -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="EduDash Pro" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon-180.png" />
</head>
<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
  <!-- 
    This HTML file is a template for Expo web.
    The React app will be mounted in the #root div above.
  -->
</body>
</html>
